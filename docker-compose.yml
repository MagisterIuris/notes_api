version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: notes_api
      POSTGRES_PASSWORD: notes_api
      POSTGRES_DB: notesdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file: 
      - .env
      
volumes:
  postgres_data: